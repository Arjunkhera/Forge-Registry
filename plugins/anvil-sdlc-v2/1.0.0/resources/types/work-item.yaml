name: work-item
parent: _core
description: "The atomic unit of work in the SDLC. Has a subtype that determines its shape, ceremony, and lifecycle behavior."
fields:
  subtype:
    type: enum
    values: [feature, bugfix, refactor, spike, hotfix, task, chore]
    required: true
  ceremony:
    type: enum
    values: [full, standard, light]
  status:
    type: enum
    values: [draft, ready, in_progress, in_review, done, blocked, cancelled]
    default: draft
  priority:
    type: enum
    values: [P0-critical, P1-high, P2-medium, P3-low]
    default: P2-medium
  project:
    type: reference
    description: Link to the parent project note
template: |
  ## Description

  {description}

  ## {{subtype_sections}}

  ## History

  | Date | From | To | By | Notes |
  |------|------|----|----|-------|
  | {{created}} | — | draft | system | Created |
