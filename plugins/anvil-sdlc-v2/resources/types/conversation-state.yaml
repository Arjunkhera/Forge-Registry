name: conversation-state
parent: _core
description: "Tracks the live state of an active agent conversation — topic, open questions, decisions made, and handoff notes. One per session; replaced on each update."
behaviors:
  replace_body: true
  singleton_per_session: true
ttl:
  inactive_days: 7
  on_expiry: archive
fields:
  topic:
    type: string
    required: true
    description: Short label for what this conversation is about
  workspace:
    type: string
    required: true
    description: Workspace ID this conversation is running in
  session_id:
    type: string
    required: false
    description: Forge session ID if code work is in progress
  status:
    type: enum
    values: [active, paused]
    default: active
  decided:
    type: string_list
    required: false
    description: Compressed decisions made during this conversation
  open:
    type: string_list
    required: false
    description: Unresolved questions still being worked through
  personas:
    type: string_list
    required: false
    description: Active persona IDs contributing to this conversation
  last_suggestion:
    type: string
    required: false
    description: Last output from the Haiku evaluator
  last_skill:
    type: string
    required: false
    description: Which skill ran last in this conversation
  handoff_note:
    type: string
    required: false
    description: Written at pause time — context for the next session to resume
  project:
    type: reference
    required: false
    description: Linked project note
  work_items:
    type: string_list
    required: false
    description: Work item IDs touched or created during this conversation
template:
  frontmatter:
    tags: []
  body: |
    ## Topic

    {topic}

    ## Status

    {status}

    ## Decided

    - {decision}

    ## Open Questions

    - {question}

    ## Handoff Note

    {handoff_note}
