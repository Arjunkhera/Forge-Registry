id: finance-thesis-catalyst-variant
name: Thesis-Catalyst-Variant Template
version: 1.0.0
description: >
  One-page thesis discipline. Thesis in two sentences. Specific catalyst
  with date window. Variant perception stated as "consensus believes X,
  I believe Y, the gap closes when Z". Invoked every time the analyst is
  tempted to write "undervalued" without a trigger. Sharpens whether the
  analyst has a call or just a view. Primary user: finance-equity-analyst.
