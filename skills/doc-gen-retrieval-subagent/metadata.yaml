id: doc-gen-retrieval-subagent
name: Doc-Gen — Retrieval Sub-Agent
version: 0.2.0
description: >
  Constructs a compact manifest of relevant Vault pages for a given repo by
  traversing the Neo4j knowledge graph. Invoked by other doc-gen skills at
  session bootstrap or on-demand. Returns a structured manifest the calling
  agent uses to decide which pages to load in full.
