id: finance-consensus-scraper
name: Consensus Scraper
version: 1.0.1
description: >
  Sub-agent that pulls sell-side estimates for a ticker across forward
  periods and returns the full distribution (not just the mean), revision
  velocity, and the specific line items where dispersion is widest.
  Surfaces where variant perception is quantitatively visible.
  Primary caller: finance-equity-analyst.
type: agent
rootSkill: finance-thesis-catalyst-variant
author: Arjun Khera
license: MIT
tags:
  - finance
  - sub-agent
  - fundamental-analysis
  - consensus
  - variant-perception
  - sell-side
primary_persona: finance-equity-analyst
