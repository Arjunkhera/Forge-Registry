id: finance-fcf-bridge
name: FCF Bridge Builder
version: 1.0.0
description: >
  Sub-agent that reconciles reported EBITDA to unlevered free cash flow
  for a ticker and period range, tracing every add-back, working-capital
  swing, and one-time charge to its source line in the filings. Refuses
  to ship if the bridge doesn't tie. Primary caller: finance-equity-analyst.
type: agent
rootSkill: finance-unit-economics-teardown
author: Arjun Khera
license: MIT
tags:
  - finance
  - sub-agent
  - fundamental-analysis
  - free-cash-flow
  - valuation
  - ebitda-bridge
  - unit-economics
primary_persona: finance-equity-analyst
