id: finance-transcript-parser
name: Transcript Parser
version: 1.0.0
description: >
  Sub-agent that ingests earnings-call or investor-day transcripts and
  returns the prepared-vs-Q&A tone delta, hedging-language frequency,
  analyst question clustering, and numbers management volunteered vs was
  forced to disclose. Surfaces the pressure points, not a summary.
  Primary caller: finance-equity-analyst.
type: agent
rootSkill: finance-thesis-pre-mortem
author: Arjun Khera
license: MIT
tags:
