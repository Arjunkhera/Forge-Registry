id: finance-setup-journal
name: Setup Journal
version: 1.0.0
description: >
  Sub-agent that ingests trade records (entry notes, screenshots, post-mortems)
  and files them against a setup taxonomy with outcome tagged. Maintains a
  per-setup library with hit rate, average R-multiple, and average hold time.
  Primary caller: finance-swing-trader.
type: agent
rootSkill: finance-stopped-out-post-mortem
author: Arjun Khera
license: MIT
tags:
  - finance
  - sub-agent
  - trading
  - journaling
  - learning
  - setup-taxonomy
primary_persona: finance-swing-trader
