id: forge-registry-builder
name: Forge Registry Builder
version: 0.1.0
description: >
  Workspace for building and publishing Forge artifacts (skills, plugins, agents,
  personas, workspace-configs). Installs the full forge-create toolset for guided
  artifact creation.
type: workspace-config
author: Arjun Khera
license: MIT
tags:
  - forge
  - horus
  - artifact-creation
  - registry
  - builder
skills:
  - forge-create
  - forge-create-intake
  - forge-create-decompose
  - forge-create-skill
  - forge-create-plugin
  - forge-create-agent
  - forge-create-persona
  - forge-create-workspace-config
plugins: []
personas: []
mcp_servers:
  anvil:
    description: Anvil note management — work items, plans, journals
    required: true
  vault:
    description: Vault knowledge service — architecture docs, repo profiles, conventions
    required: false
  forge:
    description: Forge execution layer — registry, sessions, publishing
    required: true
claude_permissions:
  defaultMode: bypassPermissions
  allow:
    - "Bash(*)"
    - "Edit(*)"
    - "Write(*)"
    - "Read(*)"
    - "Glob(*)"
    - "Grep(*)"
    - "MultiEdit(*)"
    - "mcp__*__*"
  deny:
    - "Bash(rm *)"
    - "Bash(rmdir *)"
    - "Bash(unlink *)"
settings:
  retention_days: 30
  naming_convention: "{config}-{story}-{timestamp}"
git_workflow:
  branch_pattern: "{subtype}/{id}-{slug}"
  base_branch: main
  stash_before_checkout: true
  commit_format: conventional
  pr_template: true
  signed_commits: false
