id: finance
name: Finance Research Workspace
version: 1.2.0
description: >
  Finance-domain workspace configuration for the Horus platform. A focused
  research environment with the Research Division pipeline (research-lead
  skill + finance-map-keeper agent), 12 finance methodology skills, and 16
  specialised sub-agents wired into a five-voice finance-specialist persona
  council (swing trader, equity analyst, hedge-fund PM, long-only allocator,
  quant). Workspace is context-only — no repo clones. Code sessions created
  on-demand via forge_develop.
type: workspace-config
author: Arjun Khera
license: MIT
tags:
  - finance
  - horus
  - research
  - agentic-finance
  - phase-2
plugins: []
skills:
  # Research Division
  - research-lead
  # Phase 2 methodology skills (per persona)
  - finance-pre-trade-checklist
  - finance-stopped-out-post-mortem
  - finance-phase-of-market
  - finance-thesis-catalyst-variant
  - finance-thesis-pre-mortem
  - finance-unit-economics-teardown
  - finance-position-fit-pre-mortem
  - finance-regime-change-playbook
  - finance-opportunity-set-filter
  - finance-rebalancing-discipline
  - finance-pre-registration-checklist
  - finance-backtest-autopsy
agents:
  # Research Division
  - finance-map-keeper
  # Phase 2 sub-agents (per persona)
  - finance-tape-reader
  - finance-stop-and-size
  - finance-setup-journal
  - finance-filings-diff
  - finance-transcript-parser
  - finance-fcf-bridge
  - finance-consensus-scraper
  - finance-factor-decomposer
  - finance-stress-runner
  - finance-risk-budget-reconciler
  - finance-macro-regime-tracker
  - finance-drift-monitor
  - finance-walk-forward-backtester
  - finance-multiple-testing-adjuster
  - finance-edge-decay-monitor
  - finance-regime-classifier
personas:
  - finance-swing-trader
  - finance-equity-analyst
  - finance-portfolio-manager
  - finance-allocator
  - finance-quant
mcp_servers:
  anvil:
    description: Anvil note management — work items, plans, projects, scratch journals
    required: true
  vault:
    description: Vault knowledge service — architecture docs, repo profiles, conventions
    required: false
  forge:
    description: Forge execution layer — workspace management, repo index, code sessions via forge_develop
    required: false
claude_permissions:
  defaultMode: bypassPermissions
  allow:
    - "Bash(*)"
    - "Edit(*)"
    - "Write(*)"
    - "Read(*)"
    - "Glob(*)"
    - "Grep(*)"
    - "MultiEdit(*)"
    - "mcp__*__*"
  deny:
    - "Bash(rm *)"
    - "Bash(rmdir *)"
    - "Bash(unlink *)"
settings:
  retention_days: 30
  naming_convention: "{config}-{story}-{timestamp}"
git_workflow:
  branch_pattern: "{subtype}/{id}-{slug}"
  base_branch: main
  stash_before_checkout: true
  commit_format: conventional
  pr_template: true
  signed_commits: false
